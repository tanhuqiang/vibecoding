<!DOCTYPE html>
<html lang=\"zh-CN\">
<head>
    <meta charset=\"UTF-8\">
    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">
    <title>╠░│į╔▀ė╬ŽĘ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; position: relative;
        }
        body::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
                radial-gradient(circle at 40% 60%, rgba(120, 219, 255, 0.2) 0%, transparent 40%);
            animation: float 8s ease-in-out infinite;
        }
        @keyframes float { 0%, 100% { transform: translateY(0px) rotate(0deg); } 50% { transform: translateY(-20px) rotate(2deg); } }
        h1 {
            margin-bottom: 30px; font-size: 3rem; font-weight: 800;
            text-shadow: 4px 4px 8px rgba(0, 0, 0, 0.3);
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb);
            background-size: 200% 200%;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
            animation: gradientText 3s ease infinite, pulse 3s ease-in-out infinite;
            z-index: 1; position: relative;
        }
        @keyframes gradientText { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .game-container { position: relative; margin-bottom: 25px; z-index: 1; }
        .game-container::before {
            content: ''; position: absolute; top: -15px; left: -15px; right: -15px; bottom: -15px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ceb4, #ff6b6b);
            background-size: 300% 300%; border-radius: 15px; z-index: -1;
            animation: gradientShift 5s ease infinite; box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }
        @keyframes gradientShift { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        #game-board {
            border: 4px solid #2c3e50; background-color: #1a1a2e; border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3), inset 0 2px 5px rgba(255, 255, 255, 0.1);
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .game-info { margin-top: 15px; display: flex; justify-content: space-around; width: 400px; font-size: 20px; font-weight: bold; z-index: 1; position: relative; }
        .game-info > div {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white;
            padding: 12px 25px; border-radius: 25px;
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4), 0 0 15px rgba(102, 126, 234, 0.2);
            transition: all 0.3s ease; position: relative; overflow: hidden;
        }
        .game-info > div::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent); transition: left 0.5s; }
        .game-info > div:hover::before { left: 100%; }
        .game-info > div:hover { transform: translateY(-5px); box-shadow: 0 10px 25px rgba(102, 126, 234, 0.5), 0 0 20px rgba(102, 126, 234, 0.3); }
        .controls { margin-top: 25px; display: flex; gap: 20px; z-index: 1; position: relative; }
        button {
            padding: 15px 30px; font-size: 18px; font-weight: bold; border: none; border-radius: 30px;
            color: white; cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative; overflow: hidden; min-width: 120px; text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.2); box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }
        button::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent); transition: left 0.6s; }
        button:hover::before { left: 100%; }
        button:hover { transform: translateY(-5px) scale(1.05); box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3); }
        button:active { transform: translateY(-2px) scale(0.98); }
        button:nth-child(1) { background: linear-gradient(135deg, #00b894, #00cec9); box-shadow: 0 8px 25px rgba(0, 184, 148, 0.4); }
        button:nth-child(1):hover { box-shadow: 0 15px 35px rgba(0, 184, 148, 0.5); }
        button:nth-child(2) { background: linear-gradient(135deg, #fdcb6e, #e17055); box-shadow: 0 8px 25px rgba(253, 203, 110, 0.4); }
        button:nth-child(2):hover { box-shadow: 0 15px 35px rgba(253, 203, 110, 0.5); }
        #game-over {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.9), rgba(26, 26, 46, 0.9)); color: white;
            padding: 30px; border-radius: 15px; text-align: center; font-size: 28px; font-weight: bold; z-index: 10;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 30px rgba(102, 126, 234, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2); animation: fadeIn 0.5s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translate(-50%, -50%) scale(0.8); } to { opacity: 1; transform: translate(-50%, -50%) scale(1); } }
        #game-over button { margin-top: 20px; background: linear-gradient(135deg, #667eea, #764ba2); box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4); }
        #game-over button:hover { box-shadow: 0 15px 35px rgba(102, 126, 234, 0.5); }
    </style>
</head>
<body>
    <h1>╠░│į╔▀ė╬ŽĘ</h1>
    <div class=\"game-container\">
        <canvas id=\"game-board\" width=\"400\" height=\"400\"></canvas>
        <div id=\"game-over\" style=\"display: none;\">
            ė╬ŽĘĮß╩°ŻĪ<br>
            Ą├ĘųŻ║<span id=\"final-score\">0</span><br>
            <button onclick=\"startGame()\">ųžą┬┐¬╩╝</button>
        </div>
    </div>
    <div class=\"game-info\">
        <div>Ą├ĘųŻ║<span id=\"score\">0</span></div>
        <div>Ą╚╝ČŻ║<span id=\"level\">1</span></div>
    </div>
    <div class=\"controls\">
        <button onclick=\"startGame()\">┐¬╩╝ė╬ŽĘ</button>
        <button onclick=\"pauseGame()\">į▌═Ż</button>
    </div>
    <script>
        const canvas = document.getElementById('game-board');
        const ctx = canvas.getContext('2d');
        const gridSize = 20;
        const boardWidth = canvas.width;
        const boardHeight = canvas.height;
        let snake = [];
        let food = {};
        let direction = 'right';
        let nextDirection = 'right';
        let score = 0;
        let level = 1;
        let gameSpeed = 100;
        let gameInterval;
        let gameRunning = false;
        let gamePaused = false;
        function initGame() {
            snake = [{ x: 10, y: 10 }, { x: 9, y: 10 }, { x: 8, y: 10 }];
            direction = 'right';
            nextDirection = 'right';
            score = 0;
            level = 1;
            gameSpeed = 100;
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            generateFood();
            document.getElementById('game-over').style.display = 'none';
        }
        function generateFood() {
            food = { x: Math.floor(Math.random() * (boardWidth / gridSize)), y: Math.floor(Math.random() * (boardHeight / gridSize)) };
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) { generateFood(); return; }
            }
        }
        function drawGame() {
            ctx.clearRect(0, 0, boardWidth, boardHeight);
            for (let i = 0; i < snake.length; i++) {
                const segment = snake[i];
                const gradient = ctx.createLinearGradient(segment.x * gridSize, segment.y * gridSize, (segment.x + 1) * gridSize, (segment.y + 1) * gridSize);
                if (i === 0) { gradient.addColorStop(0, '#9b59b6'); gradient.addColorStop(1, '#667eea'); }
                else { const alpha = 0.7 + (i / snake.length) * 0.3; gradient.addColorStop(0, 'rgba(102, 126, 234, ' + alpha + ')'); gradient.addColorStop(1, 'rgba(155, 89, 182, ' + alpha + ')'); }
                ctx.fillStyle = gradient;
                roundedRect(ctx, segment.x * gridSize, segment.y * gridSize, gridSize - 2, gridSize - 2, 4);
            }
            const foodGradient = ctx.createLinearGradient(food.x * gridSize, food.y * gridSize, (food.x + 1) * gridSize, (food.y + 1) * gridSize);
            foodGradient.addColorStop(0, '#ff6b6b'); foodGradient.addColorStop(1, '#ee5a6f');
            ctx.fillStyle = foodGradient;
            roundedRect(ctx, food.x * gridSize, food.y * gridSize, gridSize - 2, gridSize - 2, 4);
        }
        function roundedRect(ctx, x, y, width, height, radius) {
            ctx.beginPath(); ctx.moveTo(x + radius, y); ctx.lineTo(x + width - radius, y);
            ctx.quadraticCurveTo(x + width, y, x + width, y + radius); ctx.lineTo(x + width, y + height - radius);
            ctx.quadraticCurveTo(x + width, y + height, x + width - radius, y + height); ctx.lineTo(x + radius, y + height);
            ctx.quadraticCurveTo(x, y + height, x, y + height - radius); ctx.lineTo(x, y + radius);
            ctx.quadraticCurveTo(x, y, x + radius, y); ctx.fill();
        }
        function updateGame() {
            if (!gameRunning || gamePaused) return;
            direction = nextDirection;
            const head = { ...snake[0] };
            switch (direction) {
                case 'up': head.y--; break; case 'down': head.y++; break; case 'left': head.x--; break; case 'right': head.x++; break;
            }
            if (head.x < 0 || head.x >= boardWidth / gridSize || head.y < 0 || head.y >= boardHeight / gridSize) { endGame(); return; }
            for (let i = 1; i < snake.length; i++) { if (head.x === snake[i].x && head.y === snake[i].y) { endGame(); return; } }
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                const newLevel = Math.floor(score / 50) + 1;
                if (newLevel > level) {
                    level = newLevel;
                    gameSpeed = Math.max(50, 100 - (level - 1) * 10);
                    document.getElementById('level').textContent = level;
                    clearInterval(gameInterval);
                    gameInterval = setInterval(gameLoop, gameSpeed);
                }
                generateFood();
            } else { snake.pop(); }
            snake.unshift(head);
            drawGame();
        }
        function gameLoop() { updateGame(); }
        function startGame() {
            if (gameRunning) clearInterval(gameInterval);
            initGame();
            gameRunning = true;
            gamePaused = false;
            gameInterval = setInterval(gameLoop, gameSpeed);
        }
        function pauseGame() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            const pauseButton = document.querySelector('button:nth-child(2)');
            pauseButton.textContent = gamePaused ? '╝╠ą°' : 'į▌═Ż';
        }
        function endGame() {
            gameRunning = false;
            clearInterval(gameInterval);
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').style.display = 'block';
        }
        document.addEventListener('keydown', function(e) {
            switch (e.key) {
                case 'ArrowUp': if (direction !== 'down') nextDirection = 'up'; break;
                case 'ArrowDown': if (direction !== 'up') nextDirection = 'down'; break;
                case 'ArrowLeft': if (direction !== 'right') nextDirection = 'left'; break;
                case 'ArrowRight': if (direction !== 'left') nextDirection = 'right'; break;
                case ' ': pauseGame(); break;
            }
        });
        initGame();
        drawGame();
    </script>
</body>
</html>
